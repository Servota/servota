name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Install • Build packages • Lint • Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm 9.7.0
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build shared packages (@servota/ui, @servota/shared)
        run: pnpm -r --filter "@servota/ui" --filter "@servota/shared" build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
